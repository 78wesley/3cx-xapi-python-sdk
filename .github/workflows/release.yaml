name: Draft Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-draft:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        run: pip install uv

      - name: Sync dependencies
        run: uv sync

      - name: Build package
        run: uv build

      - name: Create Draft GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=${GITHUB_REF_NAME}

          gh release create "$TAG" \
            --title "$TAG" \
            --draft \
            --generate-notes \
            dist/*